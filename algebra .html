<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Algebra Challenge Generator</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#6a11cb,#2575fc);
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
}

h1 {
  margin: 0;
}

.container {
  padding: 20px;
  max-width: 600px;
  margin: auto;
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
}

.problem {
  font-size: 20px;
  margin-bottom: 10px;
}

input[type="number"] {
  padding: 8px;
  border-radius: 6px;
  border: none;
  width: 100px;
  margin-right: 10px;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  background: #ff6b6b;
  color: white;
  margin-top: 10px;
}

.feedback {
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>
<body>

<header>
  <h1>Algebra Challenge</h1>
  <span>Score: <span id="score">0</span></span>
</header>

<div class="container">
  <div class="problem" id="problem"></div>
  <input type="number" id="answer" placeholder="Your answer">
  <button onclick="submitAnswer()">Submit</button>
  <div class="feedback" id="feedback"></div>
  <button onclick="nextProblem()">Next Problem</button>
</div>

<script>
// STATE
let currentProblem = {};
let score = 0;

// PROBLEM GENERATOR
function generateProblem(){
  const type = Math.floor(Math.random()*3); // 0: polygon angle, 1: linear equation, 2: algebraic expression

  if(type === 0){ 
    // Polygon interior angle problem
    const n = Math.floor(Math.random()*6)+3; // 3 to 8 sides
    const sum = (n-2)*180;
    currentProblem = {
      text: `A polygon has ${n} sides. What is the sum of its interior angles?`,
      answer: sum
    };
  } else if(type === 1){
    // Simple linear equation
    const a = Math.floor(Math.random()*10)+1;
    const b = Math.floor(Math.random()*20)-10;
    const x = Math.floor(Math.random()*10)+1;
    const c = a*x + b;
    currentProblem = {
      text: `Solve for x: ${a}x + ${b} = ${c}`,
      answer: x
    };
  } else {
    // Algebraic expression simplification
    const a = Math.floor(Math.random()*10)+1;
    const b = Math.floor(Math.random()*10)+1;
    currentProblem = {
      text: `Simplify: ${a}x + ${b}x`,
      answer: a+b
    };
  }

  document.getElementById('problem').innerText = currentProblem.text;
  document.getElementById('answer').value = '';
  document.getElementById('feedback').innerText = '';
}

function submitAnswer(){
  const userAns = Number(document.getElementById('answer').value);
  if(userAns === currentProblem.answer){
    score++;
    document.getElementById('feedback').innerText = '✅ Correct!';
  } else {
    document.getElementById('feedback').innerText = `❌ Wrong! Correct answer: ${currentProblem.answer}`;
  }
  document.getElementById('score').innerText = score;
}

function nextProblem(){
  generateProblem();
}

// INIT
generateProblem();
</script>
</body>
</html>
