<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Earnings Planner </title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#11998e,#38ef7d);
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
}

h1 {
  margin: 0;
}

.container {
  padding: 20px;
  max-width: 600px;
  margin: auto;
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
}

input, select {
  padding: 8px;
  border-radius: 6px;
  border: none;
  margin: 5px 0;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  background: #ff6b6b;
  color: white;
  margin-top: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

th, td {
  padding: 8px;
  text-align: left;
}

th {
  background: rgba(0,0,0,0.2);
}

.progress-bar {
  width: 100%;
  background: rgba(255,255,255,0.2);
  border-radius: 12px;
  overflow: hidden;
  margin-top: 10px;
}

.progress {
  height: 20px;
  background: #ff6b6b;
  width: 0%;
  text-align: center;
  line-height: 20px;
  color: white;
  border-radius: 12px;
}
</style>
</head>
<body>

<header>
  <h1>Smart Earnings Planner </h1>
  <span>Total: ₦<span id="totalEarnings">0</span></span>
</header>

<div class="container">
  <h3>Add Earnings / Task</h3>
  <input type="text" id="taskName" placeholder="Task/Referral Name">
  <input type="number" id="taskAmount" placeholder="Amount (₦)">
  <button onclick="addEarning()">Add</button>

  <table>
    <thead>
      <tr>
        <th>Task</th>
        <th>Amount (₦)</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="earningsTable"></tbody>
  </table>

  <div class="progress-bar">
    <div class="progress" id="goalProgress">0%</div>
  </div>

  <input type="number" id="goalAmount" placeholder="Set Goal Amount (₦)">
  <button onclick="updateProgress()">Update Goal Progress</button>
</div>

<script>
// STATE
let earnings = JSON.parse(localStorage.getItem('earnings')) || [];
let goal = 0;

// ADD EARNING
function addEarning(){
  const name = document.getElementById('taskName').value.trim();
  const amount = Number(document.getElementById('taskAmount').value);
  if(!name || !amount) return alert('Please enter valid task and amount');
  
  earnings.push({name, amount});
  localStorage.setItem('earnings', JSON.stringify(earnings));
  renderEarnings();
}

// DELETE EARNING
function deleteEarning(index){
  earnings.splice(index,1);
  localStorage.setItem('earnings', JSON.stringify(earnings));
  renderEarnings();
}

// RENDER TABLE
function renderEarnings(){
  const tbody = document.getElementById('earningsTable');
  tbody.innerHTML = '';
  let total = 0;
  earnings.forEach((e,i)=>{
    total += e.amount;
    tbody.innerHTML += `
      <tr>
        <td>${e.name}</td>
        <td>₦${e.amount}</td>
        <td><button onclick="deleteEarning(${i})">Remove</button></td>
      </tr>
    `;
  });
  document.getElementById('totalEarnings').innerText = total;
  updateProgress();
}

// UPDATE PROGRESS BAR
function updateProgress(){
  const total = earnings.reduce((sum,e)=>sum+e.amount,0);
  goal = Number(document.getElementById('goalAmount').value) || goal;
  const percent = goal ? Math.min((total/goal)*100,100) : 0;
  const bar = document.getElementById('goalProgress');
  bar.style.width = percent+'%';
  bar.innerText = percent.toFixed(1)+'%';
}

// INIT
renderEarnings();
</script>
</body>
</html>
